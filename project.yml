name: NerLan
options:
  bundleIdPrefix: com.danielkao
  deploymentTarget:
    iOS: "17.0"
targets:
  NerLan:
    type: application
    platform: iOS
    sources:
      - NerLan/Sources
      - path: NerLan/Resources/Assets.xcassets
        buildPhase: resources
    entitlements:
      path: NerLan/Resources/NerLan.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.danielkao.NerLan
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.danielkao.NerLan
        # Key-value store for syncing favorites and the AI tab's per-episode
        # metadata (small mutable records, one key each).
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: NerLan/Resources/Info.plist
      properties:
        CFBundleDisplayName: NerLan
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # iPad supports all orientations so the two-pane split reads well in
        # landscape; iPhone stays portrait-only (above).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Surface the iCloud container as a "NerLan" folder in the Files app so
        # the user can browse/export synced transcripts & handouts. Bump
        # CFBundleVersion whenever these keys change — iOS only re-reads the
        # container metadata on a higher build number.
        NSUbiquitousContainers:
          iCloud.com.danielkao.NerLan:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: NerLan
            NSUbiquitousContainerSupportedFolderLevels: Any
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3WD42GF27D
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
