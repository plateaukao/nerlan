name: NerLan
options:
  bundleIdPrefix: com.danielkao
  deploymentTarget:
    iOS: "17.0"
targets:
  NerLan:
    type: application
    platform: iOS
    sources:
      - NerLan/Sources
      - path: NerLan/Resources/Assets.xcassets
        buildPhase: resources
    entitlements:
      path: NerLan/Resources/NerLan.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.danielkao.NerLan
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.danielkao.NerLan
        # Key-value store for syncing favorites and the AI tab's per-episode
        # metadata (small mutable records, one key each).
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: NerLan/Resources/Info.plist
      properties:
        CFBundleDisplayName: NerLan
        CFBundleShortVersionString: "1.6"
        CFBundleVersion: "7"
        # The app uses only standard HTTPS / Apple-provided crypto (App Transport
        # Security, Keychain) — exempt from export-compliance docs. Declaring this
        # skips the per-build encryption prompt on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        # Shadowing practice records the learner reading a sentence aloud so they
        # can play it back against the original; required before AVAudioRecorder
        # can start.
        NSMicrophoneUsageDescription: NerLan 會錄下你朗讀的聲音，讓你和原音對照練習跟讀。
        # iPhone rotates to landscape too: the player sheet drops its cover/header
        # in compact height (PlayerView) so the controls still fit. (No upside-down
        # on iPhone, per convention.)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad adds upside-down so the two-pane split reads well in every orientation.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Podcast feeds are arbitrary user-supplied domains and many (e.g. BBC,
        # resolved from an Apple Podcasts URL) serve cover art and all audio over
        # plain HTTP — some https enclosures even redirect to a cleartext CDN.
        # Allowing arbitrary loads lets AVPlayer stream that audio and AsyncImage
        # load that cover art; hosts can't be enumerated for a per-domain exception.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Bonjour discovery of the user's self-hosted whisperASR transcription
        # server (Settings → 自訂 → 搜尋). iOS blocks mDNS browsing unless the
        # service type is declared here and the purpose string is present.
        NSLocalNetworkUsageDescription: NerLan 會在區域網路上搜尋你的 whisperASR 轉錄伺服器，方便自動填入伺服器網址。
        NSBonjourServices:
          - _whisperasr._tcp
        # Surface the iCloud container as a "NerLan" folder in the Files app so
        # the user can browse/export synced transcripts & handouts. Bump
        # CFBundleVersion whenever these keys change — iOS only re-reads the
        # container metadata on a higher build number.
        NSUbiquitousContainers:
          iCloud.com.danielkao.NerLan:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: NerLan
            NSUbiquitousContainerSupportedFolderLevels: Any
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3WD42GF27D
        # Mac Catalyst runs under the hardened runtime, which blocks the microphone
        # unless com.apple.security.device.audio-input is granted. That key is
        # macOS-only, so the Catalyst build uses its own entitlements file; iOS
        # keeps the generated NerLan.entitlements.
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": NerLan/Resources/NerLan-macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        # Mac Catalyst: build a native macOS app from the same source. Keep the
        # bundle id identical to iOS (DERIVE…=NO) so the Mac app shares the same
        # iCloud container; macOS deployment target maps from iOS 17 (= 14.0).
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
